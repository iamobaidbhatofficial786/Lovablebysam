<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EliteBytes</title>
  <link rel="stylesheet" href="theme.css">
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <div class="sp-header">
    <div class="sp-brand">
      <img class="sp-brand-logo" src="../../assets/logo-master-lovable-square.png" alt="">      <span class="sp-brand-text">EliteBytes</span>
    </div>
    <div class="sp-header-actions">
      <button class="sp-icon-btn sp-notif-btn" title="Notifications">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        <span class="sp-notif-badge" style="display:none">0</span>
      </button>
      <button class="sp-icon-btn sp-theme-btn" title="Theme">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
      <button class="sp-icon-btn sp-settings-btn" title="License settings"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></button>
    </div>
  </div>
  
  <div class="sp-body" id="sp-body">
    <div style="padding:40px 0;text-align:center">
      <p style="color:var(--ql-text-muted)">› Loading...</p>
    </div>
  </div>


  <div class="sp-footer">
    <button class="sp-back-to-popup" id="sp-back-to-popup" title="Return to floating mode" style="display:none">
      ◀ Popup
    </button>
    <span class="sp-footer-label" style="font-size:11px;color:var(--ql-text-muted);margin-right:8px">Contact</span>
    <div class="sp-contact-row">
      <a href="https://t.me/EliteBytes" target="_blank" rel="noopener noreferrer" class="sp-contact-link sp-contact-tg" title="Telegram" id="sp-support-tg">

      </a>

      </a>
      <a href="https://facebook.com/EliteBytes" target="_blank" rel="noopener noreferrer" class="sp-contact-link sp-contact-fb" title="Facebook" id="sp-support-fb">
        <svg viewBox="0 0 24 24" width="14" height="14"><path fill="#1877F2" d="M22 12c0-5.523-4.477-10-10-10S2 6.477 2 12c0 4.991 3.657 9.128 8.438 9.878v-6.987h-2.54V12h2.54V9.797c0-2.506 1.492-3.89 3.777-3.89 1.094 0 2.238.195 2.238.195v2.46h-1.26c-1.243 0-1.63.771-1.63 1.562V12h2.773l-.443 2.89h-2.33v6.988C18.343 21.128 22 16.991 22 12z"/></svg>
      </a>
    </div>
     <span class="sp-footer-badge" id="sp-footer-version"></span>
  </div>

  <div class="sp-notif-overlay" id="sp-notif-overlay" style="display:none">
    <div class="sp-notif-panel" id="sp-notif-panel">
      <div class="sp-notif-header">
        <span class="sp-notif-title">Notifications</span>
        <button class="sp-notif-close" id="sp-notif-close" aria-label="Close"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
      </div>
      <div class="sp-notif-list" id="sp-notif-list">
        <p class="sp-notif-empty">Loading...</p>
      </div>
    </div>
  </div>

  <script src="sp-init.js"></script>
  <script src="../lib/extension-config.js"></script>
  <script src="../lib/icons.js"></script>
  <script src="../lib/lovable-auth.js"></script>
  <script src="../lib/lovable-feature-api.js"></script>
  <script src="../lib/user-messages.js"></script>
  <script src="sidepanel-templates.js"></script>
  <script src="../lib/time-license.js"></script>
  <script src="../lib/contacts-sync.js"></script>
  <script src="sp-license-wrap.js"></script>
  <script src="sidepanel.js"></script>
</body>
</html>
